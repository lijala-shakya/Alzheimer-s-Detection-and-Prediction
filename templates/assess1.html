<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuroPredict | Medical Assessment</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        :root {
            --primary-purple: #7f52f5; 
            --secondary-purple: #9d7df9;
            --text-dark: #333;
            --text-light: #6c757d;
            --border-light: #e6e6e6;
            --bg-page: #f4f7f9;
            --bg-white: #fff;
            --bg-active: #eceaff; 
            --success-green: #0e66239f;
            --step-grey: #adb5bd;
            --old-primary-purple: #6a5ae0; 
            --old-secondary-purple: #8f7dfa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            line-height: 1.6;
            background-color: var(--bg-page);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
        }

        .main {
            flex-grow: 1;
            padding: 40px;
            background: #e5e6eb;
            width: 100%;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 0 25px 0;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-light);
        }

        .logo {
            display: flex;
            align-items: center;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(to right, #cb91fa5e, #605eeb); 
            border-radius: 8px; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-right: 10px;
        }

        .logo-title {
            font-size: 1.9rem;
            font-weight: 700;
        }

        /* --- STEPPER CSS WITH FIX --- */
        .steps {
            display: flex;
            justify-content: space-between;
            margin: 0 20px 40px;
            position: relative;
        }
        
        .steps::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--border-light);
            transform: translateY(-50%);
            z-index: 0;
        }

        /* FIXED: Using CSS Variable to avoid SecurityError */
        .steps::after { 
            content: "";
            position: absolute;
            top: 50%;
            left: 0; 
            width: var(--progress-width, 0%); 
            height: 2px;
            background-color: var(--success-green);
            transform: translateY(-50%);
            z-index: 1; 
            transition: width 0.4s ease-out;
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 2;
            flex: 1;
        }

        .circle {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--step-grey);
            color: var(--bg-white);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .active .circle {
            background: linear-gradient(to right, #3B82F6, #8B2CF5); 
            box-shadow: 0 0 0 4px rgba(127, 82, 245, 0.3);
        }
        
        .form-section {
            background:#d0d0d3b2;
            border-radius: 12px;
            padding: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-light);
        }

        .form-buttons {
            display: flex;
            justify-content: flex-end; 
            margin-top: 40px;
        }

        .btn-next {
            background: linear-gradient(to right, #3B82F6, #8B2CF5); 
            color: white;
            padding: 20px 25px;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            font-weight: 600;
            font-size: 16px;

        }
            .btn-next:hover {
            box-shadow: 0 6px 15px rgba(127, 82, 245, 0.4);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: linear-gradient(to right, #282829, #979797); 
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 20px;
            color: #f8f8fcda;
        }
        .btn-secondary:hover {
            box-shadow: 0 6px 15px rgba(127, 125, 129, 0.4);
            transform: translateY(-1px);
        }

    </style>
</head>
<body>
    <div class="main">
        <div class="top-bar"> 
            <div class="logo">
                <div class="logo-icon">🧠</div>
                <div class="logo-text">
                    <h2 class="logo-title">NeuroPredict</h2>
                    <span class="logo-subtitle">Alzheimer’s Detection</span>
                </div>
            </div>
            <a href="dashboard.html" class="btn btn-secondary">
                <i class="fas fa-th-large"></i> Dashboard
            </a>
        </div>

        <div class="steps" id="assessmentSteps">
            <div class="step active"><div class="circle">1</div><p>Patient Info</p></div>
            <div class="step"><div class="circle">2</div><p>History</p></div>
            <div class="step"><div class="circle">3</div><p>Cognitive</p></div>
            <div class="step"><div class="circle">4</div><p>Scan</p></div>
            <div class="step"><div class="circle">5</div><p>Review</p></div>
        </div>

        <div class="form-section">
            <h2>Patient Information</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="patientName" placeholder="Patient name" />
                </div>
                <div class="form-group">
                    <label>Age *</label>
                    <input type="number" id="age" placeholder="patient's age">
                </div>
                <div class="form-group">
                    <label>Gender *</label>
                    <select id="gender">
                        <option value="">Select</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Handedness</label>
                    <select id="hand">
                        <option value="">Select</option>
                        <option value="R">Right-Handed</option>
                        <option value="L">Left-Handed</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Contact Number *</label>
                    <input type="text" id="contactNumber" placeholder="+977..." />
                </div>
            </div>
        </div>
        
        <div class="form-buttons">
            <button onclick="collectAndSaveCurrentPageData()" class="btn-next">
                Next <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>

<script>
    const ASSESSMENT_KEY = 'neuro_assessment_data';

    // FIXED: Using setProperty on the style to avoid CORS/Security errors
    function updateStepperProgress(pct) {
        const stepper = document.getElementById('assessmentSteps');
        if (stepper) {
            stepper.style.setProperty('--progress-width', pct);
        }
    }

    function getAssessmentData() {
        return JSON.parse(localStorage.getItem(ASSESSMENT_KEY) || '{}');
    }

    function saveAssessmentData(newData) {
        const combined = { ...getAssessmentData(), ...newData };
        localStorage.setItem(ASSESSMENT_KEY, JSON.stringify(combined));
    }

    function collectAndSaveCurrentPageData() {
        // Ensuring all fields have values before saving
        const data = {
            patientName: document.getElementById('patientName').value,
            age: document.getElementById('age').value,
            gender: document.getElementById('gender').value,
            hand: document.getElementById('hand').value,
            contactNumber: document.getElementById('contactNumber').value
        };

        if (!data.patientName || !data.age) {
            alert("Please fill in Name and Age.");
            return;
        }

        saveAssessmentData(data);
        window.location.href = 'assess2.html';
    }

    function loadFormData() {
        const data = getAssessmentData();
        // Check if elements exist before assigning values to prevent errors
        if (data.patientName) document.getElementById('patientName').value = data.patientName;
        if (data.age) document.getElementById('age').value = data.age;
        if (data.gender) document.getElementById('gender').value = data.gender;
        if (data.hand) document.getElementById('hand').value = data.hand;
        if (data.contactNumber) document.getElementById('contactNumber').value = data.contactNumber;
    }

    // Ensures data is loaded even when using the browser back button
    window.onpageshow = loadFormData;

    document.addEventListener('DOMContentLoaded', () => {
        loadFormData();
        updateStepperProgress('0%');
    });
</script>
</body>
</html>

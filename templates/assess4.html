<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroPredict - Scan Upload</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* Color Variables */
        :root {
            --primary-purple: #7f52f5; 
            --secondary-purple: #9d7df9;
            --text-dark: #333;
            --text-light: #6c757d;
            --border-light: #e6e6e6;
            --bg-page: #f4f7f9;
            --bg-white: #fff;
            --bg-active: #eceaff; 
            --success-green: #28a745;
            --step-grey: #adb5bd;
            --danger-red: #dc3545;
            
            /* ADDED: Progress variable for the stepper */
            --stepper-progress: 75%;
        }
        
        /* General Reset and Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            line-height: 1.6;
            background-color: var(--bg-page);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex; 
        }

        .dashboard-container {
            background-color: #e5e6eb; 
            width: 100%; 
            min-height: 100vh;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* Top Bar */
        .top-bar {
            width: 100%;
            padding: 40px 40px; 
            display: flex;
            justify-content: space-between; 
            align-items: center;
        }
        
        .logo-link {
            display: flex;
            align-items: center;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(to right, #cb91fa5e, #605eeb); 
            border-radius: 8px; 
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-white);
            font-weight: bold;
            font-size: 40px;
            line-height: 1;
            margin-right: 10px;
        }
        
        .logo-text {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .logo-title {
            font-size: 1.9rem; 
            font-weight: 700;
            color: var(--text-dark);
            line-height: 1.2;
        }

        .logo-subtitle {
            font-size: 1rem;
            color: var(--text-light);
            line-height: 1.2;
        }

        /* Main Content */
        .main-content {
            flex-grow: 1;
            padding: 0 40px 40px 40px; 
            width: 100%; 
        }

        .assessment-header {
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            padding-top: 10px;
            border-top: 1px solid var(--border-light);         
        }

        .assessment-header .back-link { 
            color: var(--text-dark);
            font-size: 1.5rem;
            margin-right: 20px;
            text-decoration: none;
            transition: color 0.2s;
        }
        
        .header-title-group {
            font-size: 1.8rem;
            font-weight: 600;
        }

        .assessment-header h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            font-weight: 600;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 10px;
            color: var(--text-dark);
        }

        /* Stepper */
        .assessment-steps {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            position: relative;
            padding-bottom: 15px;
            margin: 0 20px 40px;
        }

        .assessment-steps::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background-color: var(--border-light);
            transform: translateY(-50%);
            z-index: 0;
            margin: 0 15px;
        }
        
        .assessment-steps::after { 
            content: "";
            position: absolute;
            top: 50%;
            left: 15px;
            /* CHANGED: Uses the CSS variable now */
            width: var(--stepper-progress); 
            height: 2px;
            background-color: var(--success-green);
            transform: translateY(-50%);
            z-index: 1; 
            transition: width 0.4s ease-out;
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 2;
            flex: 1;
        }

        .step-circle {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background-color: var(--step-grey);
            color: var(--bg-white);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            margin-bottom: 10px;
            transition: background-color 0.3s;
        }

        .step-label {
            font-size: 0.8rem;
            color: var(--text-light);
            text-align: center;
            font-weight: 500;
            padding: 0 5px;
        }

        .step-completed .step-circle {
            background: var(--success-green); 
            box-shadow: 0 0 0 4px rgba(40, 167, 69, 0.2);
        }

        .step-active .step-circle {
            background: linear-gradient(to right, #3B82F6, #8B2CF5);
            box-shadow: 0 0 0 4px rgba(127, 82, 245, 0.3);
        }

        /* Content Panel */
        .content-panel {
            background: #d0d0d3b2;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .file-upload-box {
            border: 2px dashed var(--border-light);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            background-color: var(--bg-white);
            transition: border-color 0.3s, background-color 0.3s;
        }

        .file-upload-box:hover {
            border-color: var(--primary-purple);
            background-color: var(--bg-active);
        }

        .upload-icon {
            font-size: 3rem;
            color: var(--primary-purple);
            margin-bottom: 10px;
        }

        .upload-text button {
            background: linear-gradient(to right, #3B82F6, #8B2CF5); 
            color: var(--bg-white);
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
        }

        .file-status {
            display: none;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            border-radius: 8px;
            background-color: var(--bg-active);
            border: 1px solid var(--secondary-purple);
        }

        .navigation-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid var(--border-light);
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-prev {
            background-color: #e5e6eb46;
            color: #000000;
            border: 1px solid var(--border-light);
        }
        .btn-prev:hover {
            box-shadow: 0 6px 15px rgba(127, 125, 129, 0.4);
            transform: translateY(-1px);
        }

        .btn-next {
            background: linear-gradient(to right, #3B82F6, #8B2CF5); 
            color: var(--bg-white);
            padding: 20px 25px;
            font-size: 16px;
        }
        .btn-next:hover {
            box-shadow: 0 6px 15px rgba(127, 82, 245, 0.4);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: linear-gradient(to right, #282829, #979797); 
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 20px;
            color: #f8f8fcda;
        }
        .btn-secondary:hover {
            box-shadow: 0 6px 15px rgba(127, 125, 129, 0.4);
            transform: translateY(-1px);
        }

    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="top-bar">
            <a href="dashboard.html" class="logo-link">
                <div class="logo-icon">🧠</div>
                <div class="logo-text">
                    <h2 class="logo-title">NeuroPredict</h2>
                    <span class="logo-subtitle">Alzheimer’s Detection</span>
                </div>
            </a>
            <a href="dashboard.html" class="btn btn-secondary">
                <i class="fas fa-th-large"></i> Dashboard
            </a>
        </div>
        
        <main class="main-content">
            <div class="assessment-header">
                <a href="assess3.html" class="back-link"><i class="fas fa-arrow-left"></i></a>
                <div class="header-title-group">
                    <h2 class="header-main-title">Scan Upload</h2>
                </div>
            </div>

            <div class="assessment-steps" id="assessmentSteps">
                <div class="step step-completed">
                    <div class="step-circle">1</div>
                    <span class="step-label">Patient Information</span>
                </div>
                <div class="step step-completed">
                    <div class="step-circle">2</div>
                    <span class="step-label">Medical History</span>
                </div>
                <div class="step step-completed">
                    <div class="step-circle">3</div>
                    <span class="step-label">Cognitive Assessment</span>
                </div>
                <div class="step step-active">
                    <div class="step-circle">4</div>
                    <span class="step-label">Scan Upload</span>
                </div>
                <div class="step">
                    <div class="step-circle">5</div>
                    <span class="step-label">Review & Submit</span>
                </div>
            </div>
            
            <div class="content-panel">
                <h3>Upload Brain Scan (MRI)</h3>
                <div class="upload-section">
                    <div class="file-upload-box" id="fileUploadBox">
                        <div class="upload-icon"><i class="fas fa-cloud-upload-alt"></i></div>
                        <div class="upload-text">
                            <p>Drag and drop your file here, or</p>
                            <button id="selectFileBtn">Select File</button>
                            <input type="file" id="fileInput" accept=".png,.jpg" style="display: none;">
                        </div>
                    </div>
                    
                    <div class="file-status" id="fileStatus">
                        <div class="file-status-info">
                            <i class="fas fa-check-circle"></i>
                            <span id="fileNameDisplay"></span>
                        </div>
                        <i class="fas fa-times file-remove" id="removeFileBtn" style="cursor:pointer"></i>
                    </div>
                </div>

                <div class="navigation-buttons">
                    <a href="assess3.html" class="btn btn-prev"><i class="fas fa-arrow-left"></i> Previous</a>
                    <button onclick="collectAndSaveCurrentPageData()" class="btn btn-next">Review & Submit <i class="fas fa-arrow-right"></i></button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // DOM elements
        const fileInput = document.getElementById('fileInput');
        const selectFileBtn = document.getElementById('selectFileBtn');
        const fileUploadBox = document.getElementById('fileUploadBox');
        const fileStatus = document.getElementById('fileStatus');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const removeFileBtn = document.getElementById('removeFileBtn');

        // Display selected file
        const displayFile = (file) => {
            fileNameDisplay.textContent = file.name;
            fileStatus.style.display = 'flex';
            fileUploadBox.style.display = 'none';
        };

        // Reset file input
        const resetFile = () => {
            fileStatus.style.display = 'none';
            fileUploadBox.style.display = 'block';
            fileInput.value = '';
        };

        selectFileBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (event) => {
            if (event.target.files.length > 0) {
                const file = event.target.files[0];
                const ext = file.name.split('.').pop().toLowerCase();
                if (['png', 'jpg', 'jpeg'].includes(ext)) {
                    displayFile(file);
                } else {
                    alert('Invalid file type. Please upload a .png or .jpg image.');
                    resetFile();
                }
            }
        });

        removeFileBtn.addEventListener('click', resetFile);

        // LocalStorage helpers
        const getAssessmentData = () => JSON.parse(localStorage.getItem('neuro_assessment_data') || '{}');
        const saveAssessmentData = (newData) => {
            const existingData = getAssessmentData();
            localStorage.setItem('neuro_assessment_data', JSON.stringify({...existingData, ...newData}));
        };

        // Main function: Upload + Predict + Save + Redirect
        async function collectAndSaveCurrentPageData() {
            if (fileInput.files.length === 0) {
                alert("Please select an MRI scan to continue.");
                return;
            }

            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('mri_file', file);

            const nextBtn = document.querySelector('.btn-next');
            const originalText = nextBtn.innerHTML;
            nextBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Analyzing Scan...';
            nextBtn.disabled = true;

            try {
                // 1️⃣ Upload the MRI
                const uploadRes = await fetch('/api/upload-scan', { method: 'POST', body: formData });
                const uploadData = await uploadRes.json();
                if (!uploadRes.ok) throw new Error(uploadData.detail || "Upload failed");

                // 2️⃣ Trigger AI prediction immediately
                const predictData = new FormData();
                predictData.append('mri_filename', uploadData.filename);

                const predictRes = await fetch('/api/predict', { method: 'POST', body: predictData });
                const aiResult = await predictRes.json();
                if (!predictRes.ok || aiResult.status !== "success") throw new Error(aiResult.detail || aiResult.message || "Prediction failed");

                // 3️⃣ Save data to localStorage
                const existingData = getAssessmentData();
                const finalData = { 
                    ...existingData,
                    mri_filename: uploadData.filename,
                    ai_prediction: aiResult.predicted_class, // simplified for review
                    ai_details: aiResult                 // full AI info
                };
                localStorage.setItem('neuro_assessment_data', JSON.stringify(finalData));

                // 4️⃣ Redirect to Review page
                window.location.href = 'assess5.html';

            } catch (err) {
                alert("Error: " + err.message);
                nextBtn.innerHTML = originalText;
                nextBtn.disabled = false;
            }
        }

        // Stepper progress logic
        const updateStepperProgress = () => {
            const stepsContainer = document.getElementById('assessmentSteps');
            if(!stepsContainer) return;

            const allSteps = stepsContainer.querySelectorAll('.step');
            allSteps.forEach((step) => {
                if (step.classList.contains('step-completed')) {
                    const circle = step.querySelector('.step-circle');
                    if(circle) circle.innerHTML = '<i class="fas fa-check"></i>';
                }
            });

            const totalSteps = allSteps.length;
            const progress = ((4 - 1) / (totalSteps - 1)) * 100; // Step 4 active
            document.documentElement.style.setProperty('--stepper-progress', `${progress}%`);
        };

        document.addEventListener('DOMContentLoaded', () => {
            localStorage.removeItem('ai_prediction');
            localStorage.removeItem('initial_svm_guess');
            updateStepperProgress();
        });
        </script>

</body>
</html>
